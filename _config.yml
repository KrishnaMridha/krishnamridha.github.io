# About
about: >
  I am a PhD candidate in Biomedical and Health Informatics at Case Western 
  Reserve University and a Research Fellow at the Lerner Research Institute, 
  Cleveland Clinic. My research focuses on developing explainable and 
  uncertainty-aware deep learning systems for cardiovascular and clinical 
  applications, including multimodal medical imaging, uncertainty quantification, 
  and large language models for clinical text understanding.
