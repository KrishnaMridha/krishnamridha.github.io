short_bio: >-
  <p>
    I am a PhD candidate in Biomedical and Health Informatics at 
    <a href="https://case.edu" target="_blank">Case Western Reserve University</a> 
    and a Research Fellow at the 
    <a href="https://www.lerner.ccf.org" target="_blank">Lerner Research Institute, Cleveland Clinic</a>. 
    My research sits at the intersection of deep learning, medical image analysis, 
    and clinical decision support, with a focus on developing explainable and 
    uncertainty-aware AI systems for cardiovascular and clinical applications.
  </p>
  <p>My broader research interests include:</p>
  <ul>
    <li><span style="color:#c0392b; font-weight:bold;">Explainable AI for Medical Imaging</span> 
    — interpretable deep learning systems for cardiovascular and clinical imaging modalities</li>
    <li><span style="color:#1a5276; font-weight:bold;">Multimodal Learning</span> 
    — integrating imaging, clinical records, and structured EHR data for longitudinal disease monitoring</li>
    <li><span style="color:#1e8449; font-weight:bold;">Uncertainty Quantification</span> 
    — conformal prediction and Bayesian methods for clinically trustworthy AI outputs</li>
    <li><span style="color:#7d3c98; font-weight:bold;">LLMs for Clinical Text</span> 
    — foundation models for structured clinical report understanding and information extraction</li>
  </ul>
  <p>
    Before joining Case Western, I completed my undergraduate research at Marwadi University, India, 
    where I published 9 journal papers and 16 conference papers as first author and received 
    four <strong>IEEE Best Paper Awards</strong> for work on explainable AI for medical imaging.
  </p>
