short_bio: >-
  <p>
    I am a PhD candidate in Biomedical and Health Informatics at 
    <a href="https://case.edu/medicine/pqhs/node/3296" target="_blank">Case Western Reserve University</a> 
    and a Research Fellow at the  <a href="https://my.clevelandclinic.org" target="_blank">Lerner Research Institute, Cleveland Clinic.</a>  
    My research sits at the intersection of deep learning, medical image analysis, 
    and clinical decision support, with a focus on developing explainable and 
    uncertainty-aware AI systems for cardiovascular and clinical applications.
  </p>
  <p>
    My research interests include explainable AI for medical imaging, multimodal 
    learning integrating imaging and EHR data, uncertainty quantification using 
    conformal prediction and Bayesian methods, and large language models for 
    clinical text understanding.
  </p>

